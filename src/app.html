<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <!-- Boot script: applies dark class and theme-color before first paint to avoid flash. -->
    <script>
      (function () {
        var t = 'system';
        try { t = localStorage.getItem('theme') || 'system'; } catch {}
        var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
        document.addEventListener('DOMContentLoaded', function () {
          var m = document.querySelector('meta[name=theme-color]');
          if (m) m.setAttribute('content', dark ? '#0d1117' : '#ffffff');
        });
      })();
    </script>
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0d1117" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Workspace" />
    <title>Workspace</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="off">
    <div style="height:var(--vvh,100dvh)">%sveltekit.body%</div>
  </body>
</html>
